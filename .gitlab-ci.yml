stages:
  - lint
  - test

# ── Shared Python setup ────────────────────────────────────────────────────

.python_base:
  image: python:3.12-slim
  tags:
    - saas-linux-small-amd64
  before_script:
    - pip install --quiet -r requirements_test.txt

# ── Lint ───────────────────────────────────────────────────────────────────

lint:
  extends: .python_base
  stage: lint
  script:
    - pip install --quiet pylint
    - echo "==> Linting integration..."
    - pylint custom_components/frameit/ --rcfile=.pylintrc
  allow_failure: false

# ── Test ───────────────────────────────────────────────────────────────────

test:
  extends: .python_base
  stage: test
  script:
    - echo "==> Running test suite..."
    - pytest tests/
        --tb=short
        --cov=custom_components.frameit
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
        -q
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 30 days
